version: 1.2.0
services:
  - mysql
  - php:
        version: 7.1
cde-databases:
  - ucsfpa8
variables:
  global:
    ADMIN_USERNAME: ucsf_admin
    ADMIN_PASSWORD:
      secure: 
#    SLACK_HOSTNAME: "uctech.slack.com"
#    SLACK_TOKEN:
#      secure: U48EOVjDl+h+QRi$x3kpGwBIc27rKqCblXqkv2MxMBDyV+Pas3x...
#    SLACK_CHANNEL: "#ucsf-www-ucsf-edu"
events:
  build:
    steps:
      - database:
          type: script
          script:
            - mysql -u root -proot -e "CREATE DATABASE ucsfpa8"
      - composer:
          type: script
          script:
            - composer install
      - unit_tests:
          type: script
          script:
            - echo "was this the failure"
# ./vendor/bin/phpunit
post-deploy:
  steps:
    # Deploy the build artifact to an on-demand environment,
    # and sync the specified databases.
    - deploy:
        script:
          - pipelines-deploy
          - pipelines-sync-dbs ucsfpa8